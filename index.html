<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Verdade ou Fake?</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#0f172a,#020617);color:#fff;text-align:center;padding:20px}
h1{font-size:32px}
p{opacity:0.8}
textarea{width:80%;height:150px;border-radius:10px;padding:10px;font-size:16px;border:none}
button{margin-top:10px;padding:12px 25px;font-size:16px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer;transition:0.3s}
button:hover{background:#16a34a;transform:scale(1.05)}
.result{margin-top:20px;font-size:20px;padding:15px;border-radius:10px}
.verde{background:#166534}
.amarelo{background:#a16207}
.vermelho{background:#7f1d1d}
</style>
</head>
<body>
<h1>🧠 Verdade ou Fake?</h1>
<p>Este site ajuda a identificar possíveis fake news analisando padrões comuns como linguagem sensacionalista, exageros e ausência de fontes confiáveis.</p>

<textarea id="texto" placeholder="Cole aqui a notícia..."></textarea><br>
<button onclick="analisar()">Analisar</button>

<div id="resultado" class="result"></div>
<div id="porcentagem"></div>

<script>
function analisar(){
  let texto = document.getElementById("texto").value;
  let resultado = document.getElementById("resultado");
  let porcentagemDiv = document.getElementById("porcentagem");

  let score = 0;

  const palavras = ["URGENTE","CHOCANTE","IMPERDÍVEL","VOCÊ NÃO VAI ACREDITAR","COMPARTILHE","ABSURDO","SEGREDO","REVELADO"];

  palavras.forEach(p => {
    if(texto.toUpperCase().includes(p)) score += 2;
  });

  let maiusculas = texto.replace(/[^A-Z]/g, "").length;
  if(maiusculas > texto.length * 0.3) score += 2;

  if(texto.length < 50) score += 1;

  // cálculo de confiança
  let confiabilidade = Math.max(0, 100 - (score * 20));

  if(score <= 1){
    resultado.innerHTML = "✅ Provavelmente confiável";
    resultado.className = "result verde";
  }else if(score <= 3){
    resultado.innerHTML = "⚠️ Suspeito - verifique a fonte";
    resultado.className = "result amarelo";
  }else{
    resultado.innerHTML = "❌ Possível fake news";
    resultado.className = "result vermelho";
  }

  porcentagemDiv.innerHTML = "📊 Confiabilidade: " + confiabilidade + "%";
}
</script>
</body>
</html>
